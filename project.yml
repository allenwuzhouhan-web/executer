name: Executer
options:
  bundleIdPrefix: com.allenwu
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "5.9"

packages:
  ComputerLib:
    path: ../computer

targets:
  Executer:
    type: application
    platform: macOS
    sources:
      - path: Executer
        excludes:
          - "Resources/Assets.xcassets/AppIcon.appiconset"
    resources:
      - path: Executer/Resources/Assets.xcassets
    dependencies:
      - package: ComputerLib
        product: ComputerLib
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.allenwu.executer
        INFOPLIST_FILE: Executer/Info.plist
        CODE_SIGN_ENTITLEMENTS: Executer/Executer.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
    frameworks:
      - sdk: EventKit.framework
      - sdk: UserNotifications.framework
      - sdk: ApplicationServices.framework
      - sdk: Security.framework
      - sdk: IOBluetooth.framework
      - sdk: AVFoundation.framework
      - sdk: Speech.framework
